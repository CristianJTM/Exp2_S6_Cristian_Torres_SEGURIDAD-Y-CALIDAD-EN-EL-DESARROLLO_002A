<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="https://www.thymeleaf.org">
<head>
    <title>Login con JWT</title>
    <link rel="stylesheet" type="text/css" th:href="@{/css/login.css}">
    <script type="text/javascript" th:src="@{/js/login.js}" defer></script>
</head>
<body>
<div id="errorMessage" style="color:red;"></div>
<form id="loginForm">
    <div><label> User Name : <input type="text" id="username" name="username"/> </label></div>
    <div><label> Password: <input type="password" id="password" name="password"/> </label></div>
    <div><input type="submit" value="Sign In"/></div>

    <div class="actions">
        <a class="btn btn-secondary" th:href="@{/home}">Volver a inicio</a>
    </div>
</form>


</body>
</html>
