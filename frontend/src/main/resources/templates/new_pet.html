<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Registrar Mascota</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <link rel="stylesheet" type="text/css" th:href="@{/css/style.css}" />
    <script type="text/javascript" th:src="@{/js/new_pet.js}" defer></script>
</head>
<body>
<div class="page-container">
    <h1>Registrar mascota para adopcion</h1>
    <form id="petForm" class="patient-form">
        <div>
            <label>Nombre:</label>
            <input type="text" id="name" required />
        </div>
        <div>
            <label>Tipo:</label>
            <input type="text" id="type" required />
        </div>
        <div>
            <label>Edad:</label>
            <input type="number" id="age" min="0" required />
        </div>
        <div>
            <label>Estado:</label>
            <select id="status" required>
                <option value="DISPONIBLE" selected>Disponible</option>
                <option value="ADOPTADO">Adoptada</option>
                <option value="EN_PROCESO">En Proceso</option>
            </select>
        </div>

        <div class="form-actions">
            <button class="btn btn-primary" type="submit">Guardar</button>
            <a class="btn btn-secondary" href="/pets">Cancelar</a>
        </div>

        <div id="errorPet" style="color: red; margin-top: 1rem;"></div>
    </form>
</div>


</body>
</html>
